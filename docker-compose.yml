version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: academic_ai_db
    environment:
      POSTGRES_DB: academic_intelligence_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - academic_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: academic_ai_redis
    ports:
      - "6379:6379"
    networks:
      - academic_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academic_ai_backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/academic_intelligence_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-production-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - academic_network
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academic_ai_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - academic_network
    restart: unless-stopped

networks:
  academic_network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
