# Render Blueprint - Deploy all services at once
# https://render.com/docs/blueprint-spec

services:
  # Flask Backend API
  - type: web
    name: academic-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && mkdir -p uploads reports logs ml_models static && python init_db.py
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: academic-ai-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    autoDeploy: true

  # Node.js Chatbot API
  - type: web
    name: academic-ai-chatbot
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    rootDir: chatbot-api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
      - key: GEMINI_API_KEY
        sync: false
    autoDeploy: true

databases:
  - name: academic-ai-db
    databaseName: academic_intelligence
    user: academic_user
    plan: free
    region: oregon
